<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Paylaşımlarım | Arşiv</title>
    <style>
        /* Modern ve Karanlık Tema (X Esintili) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            max-width: 800px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #1d9bf0, #8ecdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #71767b;
            font-size: 1.1rem;
        }

        /* Paylaşım Izgarası (Grid) */
        .feed-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        /* Tweet Kartı Tasarımı */
        .tweet-card {
            background: #16181c;
            border-radius: 16px;
            padding: 10px;
            border: 1px solid #2f3336;
            transition: transform 0.2s ease;
        }

        .tweet-card:hover {
            transform: translateY(-5px);
            border-color: #1d9bf0;
        }

        footer {
            padding: 30px;
            color: #71767b;
            font-size: 0.9rem;
        }

        @media (max-width: 400px) {
            .feed-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>X Paylaşımlarım</h1>
        <p>Stratejik analizler, teknoloji ve güncel düşüncelerimin derlemesi.</p>
    </header>

    <main class="feed-container">
        
        <a class="twitter-timeline" data-theme="dark" data-chrome="noheader nofooter" href="https://x.com/OSINT_Strategy">Tweets by OSINT_Strategy</a>

    </main>

    <footer>
        &copy; 2024 Tasarım GitHub Pages üzerinde yayınlanmıştır.
    </footer>

    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

</body>
</html>
